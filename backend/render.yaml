services:
  - type: web
    name: nest-entrance-backend
    env: node
    buildCommand: npm install && npm rebuild sqlite3 --build-from-source
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://<YOUR_GITHUB_USERNAME>.github.io
